# ═══════════════════════════════════════════════════════════════════════════════
# Truxify App Analyzer — Reusable Composite Action
#
# Encapsulates the full 4-layer analysis pipeline for a single Flutter app.
# Called by scan.yml with app-specific parameters.
#
# LAYERS:
#   1a — flutter analyze        : type errors, null-safety, lints
#   1b — Semgrep OSS            : pattern rules, anti-patterns, security
#   1c — Dart Code Metrics      : complexity, naming metrics, structure
#   2  — AI (Gemini + Groq + OpenRouter Fallback) : PARALLEL per file, merged + deduped
#   3  — Dedup engine           : fp5 fingerprint, zero duplicates
#
# FINGERPRINT v5 = sha256(app | file | code | line)
#   - Source-independent: same bug from different tools = one issue
#   - Migrates fp4 issues: parses existing issue bodies to avoid re-creation
# ═══════════════════════════════════════════════════════════════════════════════

name: 'Truxify App Analyzer'
description: 'Multi-layer code analysis pipeline for a Flutter app'

inputs:
  app-name:
    description: 'App directory name (customer or driver)'
    required: true
  app-label:
    description: 'GitHub label for the app (customer-app or driver-app)'
    required: true
  theme-desc:
    description: 'Theme description for AI prompts'
    required: true
  gemini-api-key:
    description: 'Google Gemini API key'
    required: false
    default: ''
  groq-api-key:
    description: 'Groq API key'
    required: false
    default: ''
  openrouter-api-key:
    description: 'OpenRouter API key'
    required: false
    default: ''
  force:
    description: 'Force re-analysis even if hash unchanged'
    required: false
    default: 'false'

outputs:
  hash:
    description: 'SHA-256 hash of analyzed source files'
    value: ${{ steps.hash.outputs.hash }}
  changed:
    description: 'Whether source files changed since last scan'
    value: ${{ steps.hash.outputs.changed }}

runs:
  using: composite
  steps:

    # ──────────────────────────────────────────────────────────────────────────
    # SETUP
    # ──────────────────────────────────────────────────────────────────────────

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true

    - name: Install dependencies
      shell: bash
      working-directory: apps/${{ inputs.app-name }}
      run: flutter pub get

    # ──────────────────────────────────────────────────────────────────────────
    # HASH CHECK — skip analysis if source unchanged since last scan
    # ──────────────────────────────────────────────────────────────────────────

    - name: Check source hash
      id: hash
      shell: bash
      run: |
        set -euo pipefail
        APP="${{ inputs.app-name }}"
        FORCE="${{ inputs.force }}"

        DART_FILES=$(find "apps/${APP}/lib" -name "*.dart" \
          ! -name "*.g.dart" ! -name "*.freezed.dart" ! -name "*.gen.dart" \
          2>/dev/null | sort)

        if [ -z "$DART_FILES" ]; then
          echo "⚠️  No Dart source files found in apps/${APP}/lib"
          echo "changed=false" >> "$GITHUB_OUTPUT"
          echo "hash=empty" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        HASH=$(echo "$DART_FILES" | xargs cat | sha256sum | cut -d' ' -f1)
        echo "hash=$HASH" >> "$GITHUB_OUTPUT"

        HASH_FILE=".github/last_scan_hash_${APP}.txt"

        if [ "$FORCE" = "true" ]; then
          echo "✅ Force scan requested — running full analysis"
          echo "changed=true" >> "$GITHUB_OUTPUT"
        elif [ -f "$HASH_FILE" ] && [ "$(cat "$HASH_FILE")" = "$HASH" ]; then
          echo "⏭️  No Dart changes since last scan — skipping"
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "🔄 Source changed — running full analysis"
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

    # ──────────────────────────────────────────────────────────────────────────
    # ENSURE GITHUB LABELS EXIST
    # ──────────────────────────────────────────────────────────────────────────

    - name: Ensure GitHub labels
      if: steps.hash.outputs.changed == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const labels = [
            { name: 'flutter-analysis',  color: '0075ca', description: 'Auto-generated code analysis issue' },
            { name: 'ai-generated',      color: 'e4e669', description: 'Created by AI analysis pipeline' },
            { name: 'semgrep',           color: '20b2aa', description: 'Found by Semgrep pattern rules' },
            { name: 'dart-metrics',      color: '9370db', description: 'Found by Dart Code Metrics' },
            { name: 'qodana',            color: 'ff6b35', description: 'Found by Qodana deep scan' },
            { name: 'customer-app',      color: '0052cc', description: 'Customer app issue' },
            { name: 'driver-app',        color: 'e65100', description: 'Driver app issue' },
            { name: 'flutter',           color: '54C5F8', description: 'Flutter framework' },
            { name: 'critical',          color: 'd73a4a', description: 'Critical severity' },
            { name: 'high',              color: 'e99695', description: 'High severity' },
            { name: 'medium',            color: 'f9d0c4', description: 'Medium severity' },
            { name: 'low',               color: 'cfd3d7', description: 'Low severity' },
            { name: 'bug',               color: 'd73a4a', description: 'Bug report' },
            { name: 'enhancement',       color: 'a2eeef', description: 'Enhancement suggestion' },
            { name: 'good first issue',  color: '7057ff', description: 'Good for newcomers' },
            { name: 'help wanted',       color: '008672', description: 'Extra attention needed' },
            { name: 'regression',        color: 'e11d48', description: 'Previously fixed issue reappeared' },
          ];
          for (const l of labels) {
            try {
              await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...l });
            } catch (e) { if (e.status !== 422) throw e; }
          }

    # ════════════════════════════════════════════════════════════════════════════
    # LAYER 1a — flutter analyze
    # ════════════════════════════════════════════════════════════════════════════

    - name: 'Layer 1a: flutter analyze'
      if: steps.hash.outputs.changed == 'true'
      shell: bash
      working-directory: apps/${{ inputs.app-name }}
      run: |
        flutter analyze --no-pub 2>&1 \
          | tee "$GITHUB_WORKSPACE/flutter_analyze_${{ inputs.app-name }}.txt" \
          || true

    # ════════════════════════════════════════════════════════════════════════════
    # LAYER 1b — Semgrep OSS
    # ════════════════════════════════════════════════════════════════════════════

    - name: 'Layer 1b: Semgrep OSS scan'
      if: steps.hash.outputs.changed == 'true'
      shell: bash
      run: |
        set -euo pipefail
        APP="${{ inputs.app-name }}"

        pip install semgrep --break-system-packages -q

        # Custom rules (guard for missing file)
        if [ -f .github/semgrep/flutter-rules.yml ]; then
          semgrep \
            --config .github/semgrep/flutter-rules.yml \
            --json --output "semgrep_${APP}.json" \
            "apps/${APP}/lib" || true
        else
          echo '{"results":[]}' > "semgrep_${APP}.json"
          echo "⚠️  .github/semgrep/flutter-rules.yml not found — skipping custom rules"
        fi

        # Community rules
        semgrep \
          --config "p/dart" \
          --json --output "semgrep_community_${APP}.json" \
          "apps/${APP}/lib" 2>/dev/null \
          || echo '{"results":[]}' > "semgrep_community_${APP}.json"

        echo "Semgrep custom:    $(jq '.results | length' "semgrep_${APP}.json") findings"
        echo "Semgrep community: $(jq '.results | length' "semgrep_community_${APP}.json") findings"

    # ════════════════════════════════════════════════════════════════════════════
    # LAYER 1c — Dart Code Metrics
    # dart_code_metrics was renamed to dart_code_linter at v5+; try both
    # ════════════════════════════════════════════════════════════════════════════

    - name: 'Layer 1c: Dart Code Metrics'
      if: steps.hash.outputs.changed == 'true'
      shell: bash
      working-directory: apps/${{ inputs.app-name }}
      run: |
        APP="${{ inputs.app-name }}"
        OUT="$GITHUB_WORKSPACE/dcm_${APP}.json"

        dart pub global activate dart_code_metrics 5.7.6 2>/dev/null \
          || dart pub global activate dart_code_linter 1.1.2 2>/dev/null \
          || { echo "⚠️  Neither dart_code_metrics nor dart_code_linter could be activated"; \
               echo '[]' > "$OUT"; exit 0; }

        export PATH="$PATH:$HOME/.pub-cache/bin"

        dart pub global run dart_code_metrics:metrics analyze lib \
          --reporter=json > "$OUT" 2>/dev/null \
          || dart pub global run dart_code_linter:metrics analyze lib \
             --reporter=json > "$OUT" 2>/dev/null \
          || echo '[]' > "$OUT"

        echo "DCM output: $(wc -l < "$OUT") lines"

    # ════════════════════════════════════════════════════════════════════════════
    # LAYER 3 — AI: Gemini + Groq run IN PARALLEL per file
    #
    # Prompt is built in Python (string concatenation, not f-strings) and
    # written to a temp file. jq --rawfile encodes it into JSON.
    # This eliminates shell injection from Dart source containing $vars,
    # backticks, or double-quotes.
    #
    # Both Gemini and Groq are fired simultaneously via background processes.
    # A Python dedup step merges both outputs per file (keyed on file|code|line)
    # before appending to the master list.
    # ════════════════════════════════════════════════════════════════════════════

    - name: 'Layer 2: AI parallel semantic analysis (Gemini + Groq + OpenRouter Fallback)'
      if: steps.hash.outputs.changed == 'true'
      shell: bash
      env:
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
        GROQ_API_KEY: ${{ inputs.groq-api-key }}
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
      run: |
        set -euo pipefail

        APP="${{ inputs.app-name }}"
        THEME="${{ inputs.theme-desc }}"
        ALL_ISSUES="ai_issues_${APP}.txt"
        > "$ALL_ISSUES"

        GEMINI_URL="https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent"
        GROQ_URL="https://api.groq.com/openai/v1/chat/completions"
        GROQ_MODEL="llama-3.3-70b-versatile"

        # ── API callers ──────────────────────────────────────────────────────
        call_gemini_to_file() {
          local payload_file="$1" out="$2" status_file="$3"
          if [ -z "${GEMINI_API_KEY:-}" ]; then echo "000" > "$status_file"; return; fi
          local s
          s=$(curl -s -o "$out" -w "%{http_code}" --max-time 90 \
            "${GEMINI_URL}?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            --data-binary "@${payload_file}" 2>/dev/null) || s="000"
          echo "$s" > "$status_file"
        }

        call_groq_to_file() {
          local payload_file="$1" out="$2" status_file="$3"
          if [ -z "${GROQ_API_KEY:-}" ]; then echo "000" > "$status_file"; return; fi
          local s
          s=$(curl -s -o "$out" -w "%{http_code}" --max-time 90 \
            "$GROQ_URL" \
            -H "Authorization: Bearer ${GROQ_API_KEY}" \
            -H "Content-Type: application/json" \
            --data-binary "@${payload_file}" 2>/dev/null) || s="000"
          echo "$s" > "$status_file"
        }

        call_openrouter_to_file() {
          local payload_file="$1" out="$2" status_file="$3"
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then echo "000" > "$status_file"; return; fi
          local s
          s=$(curl -s -o "$out" -w "%{http_code}" --max-time 90 \
            "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
            -H "HTTP-Referer: https://github.com/KanishJebaMathewM/Truxify" \
            -H "Content-Type: application/json" \
            --data-binary "@${payload_file}" 2>/dev/null) || s="000"
          echo "$s" > "$status_file"
        }

        is_quota_err() {
          [ -f "$1" ] || return 1
          jq -r '.error.message // .error // ""' "$1" 2>/dev/null \
            | tr '[:upper:]' '[:lower:]' \
            | grep -qE "quota|rate.?limit|resource.exhausted|too.many.requests" && return 0
          return 1
        }

        get_retry_wait() {
          [ -f "$1" ] || { echo "60"; return; }
          local d
          d=$(jq -r '.error.details[]? | select(."@type"=="type.googleapis.com/google.rpc.RetryInfo") | .retryDelay // empty' \
            "$1" 2>/dev/null | head -1)
          case "$d" in *s) echo "${d%s}" ;; *m) echo $(( ${d%m} * 60 )) ;; *[0-9]) echo "$d" ;; *) echo "60" ;; esac
        }

        # ── Collect Dart files ───────────────────────────────────────────────
        mapfile -t FILES < <(find "apps/${APP}/lib" -name "*.dart" \
          ! -name "*.g.dart" ! -name "*.freezed.dart" ! -name "*.gen.dart" \
          2>/dev/null | sort)

        TOTAL=${#FILES[@]}
        if [ "$TOTAL" -eq 0 ]; then
          echo "No Dart files found — skipping AI scan"
          exit 0
        fi

        SCANNED=0
        echo "Files to scan: $TOTAL"

        FLUTTER_OUT="$GITHUB_WORKSPACE/flutter_analyze_${APP}.txt"

        for FILE in "${FILES[@]}"; do
          # Guard: skip if FILE is empty (edge case from mapfile)
          [ -z "$FILE" ] && continue

          SIZE=$(wc -c < "$FILE")
          if [ "$SIZE" -gt 15000 ]; then
            echo "  Skip $FILE — too large (${SIZE}b)"
            SCANNED=$((SCANNED + 1))
            continue
          fi

          IDX="$SCANNED"
          PROMPT_FILE="_prompt_${APP}_${IDX}.txt"

          # ── Build prompt in Python — no shell interpolation of Dart source ──
          python3 - "$FILE" "$FLUTTER_OUT" "$PROMPT_FILE" "$THEME" << 'PYEOF'
        import sys

        file_path    = sys.argv[1]
        flutter_file = sys.argv[2]
        out_path     = sys.argv[3]
        theme_desc   = sys.argv[4]

        try:
            flutter_out = open(flutter_file).read()
        except Exception:
            flutter_out = "(none)"

        try:
            file_content = open(file_path).read()
        except Exception:
            file_content = ""

        prompt = (
            "You are a strict Flutter code reviewer for the Truxify app "
            "(" + theme_desc + ").\n\n"
            "RULES:\n"
            "- Only report issues CLEARLY VISIBLE in the file content below.\n"
            "- Do NOT invent issues. Do NOT hallucinate. Do NOT reference other files.\n"
            "- If the file is clean, output exactly: NO_ISSUES\n\n"
            "DO NOT re-report issues already caught by flutter analyze:\n"
            + flutter_out + "\n\n"
            "ONLY check for things static tools CANNOT catch:\n"
            "1. Misleading variable/function names (e.g. 'data', 'temp', 'handleThing' that does the opposite)\n"
            "2. Business logic placed directly inside build() instead of a separate method/provider\n"
            "3. Deeply nested callbacks that should be extracted\n"
            "4. A State class that never calls dispose() on any controllers it creates\n"
            "5. Comments that contradict the code\n"
            "6. Functions that claim one thing in their name but do another\n"
            "7. Crash-prone null handling (force-unwrapping without null check)\n\n"
            "OUTPUT FORMAT (follow exactly, one block per issue):\n\n"
            "ISSUE_START\n"
            "file: " + file_path + "\n"
            "line: <exact integer line number>\n"
            "category: Memory|Quality|Safety|Structure|Naming|Maintainability\n"
            "severity: critical|high|medium|low\n"
            "code: ML|CQ|SE|ST|NA|MA\n"
            "title: <plain English, max 8 words, no brackets>\n"
            "description: <one sentence — what is wrong and why it matters>\n"
            "fix: <concrete fix — 1-2 lines of corrected code>\n"
            "ISSUE_END\n\n"
            "If no issues found: NO_ISSUES\n\n"
            "FILE: " + file_path + "\n"
            "```dart\n"
            + file_content + "\n"
            "```"
        )

        with open(out_path, 'w') as f:
            f.write(prompt)
        PYEOF

          # ── Build JSON payloads with jq --rawfile (handles all escaping) ────
          GP_FILE="_gp_${APP}_${IDX}.json"
          RP_FILE="_rp_${APP}_${IDX}.json"

          jq -n --rawfile prompt "$PROMPT_FILE" \
            '{contents:[{parts:[{text:$prompt}]}],generationConfig:{temperature:0.05,maxOutputTokens:2048}}' \
            > "$GP_FILE"

          jq -n --rawfile prompt "$PROMPT_FILE" \
            --arg model "$GROQ_MODEL" \
            '{model:$model,max_tokens:2048,temperature:0.05,messages:[{role:"user",content:$prompt}]}' \
            > "$RP_FILE"

          # ── Launch BOTH APIs simultaneously ─────────────────────────────────
          G_RAW="_g_raw_${APP}_${IDX}.json"
          R_RAW="_r_raw_${APP}_${IDX}.json"
          G_STATUS="_gs_${APP}_${IDX}.txt"
          R_STATUS="_rs_${APP}_${IDX}.txt"

          call_gemini_to_file "$GP_FILE" "$G_RAW" "$G_STATUS" &
          PID_G=$!
          call_groq_to_file "$RP_FILE" "$R_RAW" "$R_STATUS" &
          PID_R=$!
          wait $PID_G $PID_R

          G_HTTP=$(cat "$G_STATUS" 2>/dev/null || echo "000")
          R_HTTP=$(cat "$R_STATUS" 2>/dev/null || echo "000")

          # ── Gemini fallback to OpenRouter / backoff ─────────────────────────
          if is_quota_err "$G_RAW" || [ "$G_HTTP" != "200" ]; then
            if [ -n "${OPENROUTER_API_KEY:-}" ]; then
              echo "  Gemini failed/quota exceeded (HTTP $G_HTTP) — trying OpenRouter fallback..." >&2
              OP_FILE="_op_${APP}_${IDX}.json"
              jq -n --rawfile prompt "$PROMPT_FILE" \
                --arg model "google/gemini-3-flash-preview" \
                '{model:$model,max_tokens:2048,temperature:0.05,messages:[{role:"user",content:$prompt}]}' \
                > "$OP_FILE"

              call_openrouter_to_file "$OP_FILE" "$G_RAW" "$G_STATUS"
              G_HTTP=$(cat "$G_STATUS" 2>/dev/null || echo "000")
              rm -f "$OP_FILE"
            fi

            # If it's still not 200 (fallback failed/missing), do standard retry
            if [ "$G_HTTP" != "200" ]; then
              WAIT=$(get_retry_wait "$G_RAW")
              echo "  Gemini / OpenRouter failed (HTTP $G_HTTP) — waiting ${WAIT}s then retrying..." >&2
              sleep "$WAIT"
              call_gemini_to_file "$GP_FILE" "$G_RAW" "$G_STATUS"
              G_HTTP=$(cat "$G_STATUS" 2>/dev/null || echo "000")
            fi
          fi

          # ── Groq rate limit backoff + retry once ────────────────────────────
          if [ "$R_HTTP" = "429" ]; then
            echo "  Groq rate limit — waiting 30s then retrying..." >&2
            sleep 30
            call_groq_to_file "$RP_FILE" "$R_RAW" "$R_STATUS"
            R_HTTP=$(cat "$R_STATUS" 2>/dev/null || echo "000")
          fi

          # ── Extract text from raw API responses ─────────────────────────────
          G_TEXT="_g_txt_${APP}_${IDX}.txt"
          R_TEXT="_r_txt_${APP}_${IDX}.txt"
          > "$G_TEXT"; > "$R_TEXT"

          if [ "$G_HTTP" = "200" ]; then
            if jq -e '.candidates[0].content.parts[0].text' "$G_RAW" >/dev/null 2>&1; then
              jq -r '.candidates[0].content.parts[0].text // empty' "$G_RAW" > "$G_TEXT" 2>/dev/null || true
            else
              jq -r '.choices[0].message.content // empty' "$G_RAW" > "$G_TEXT" 2>/dev/null || true
            fi
          fi
          if [ "$R_HTTP" = "200" ]; then
            jq -r '.choices[0].message.content // empty' "$R_RAW" > "$R_TEXT" 2>/dev/null || true
          fi

          # ── Merge both outputs, dedup by (file|code|line) ───────────────────
          MERGED="_merged_${APP}_${IDX}.txt"

          python3 - "$G_TEXT" "$R_TEXT" "$MERGED" << 'PYEOF'
        import sys, re, hashlib

        src_a, src_b, out_path = sys.argv[1], sys.argv[2], sys.argv[3]
        seen = set()
        out_blocks = []

        def get_field(block, key):
            m = re.search(rf'^{re.escape(key)}:\s*(.+)$', block, re.MULTILINE)
            return m.group(1).strip() if m else ''

        for src in [src_a, src_b]:
            try:
                content = open(src).read()
            except Exception:
                continue
            for block in re.findall(r'ISSUE_START(.*?)ISSUE_END', content, re.DOTALL):
                # Dedup key matches Layer 4 fingerprint dimensions: file|code|line
                key = hashlib.sha256(
                    (get_field(block, 'file') + '|' +
                     get_field(block, 'code') + '|' +
                     get_field(block, 'line')).lower().encode()
                ).hexdigest()[:20]
                if key not in seen:
                    seen.add(key)
                    out_blocks.append('ISSUE_START' + block + 'ISSUE_END\n')

        with open(out_path, 'w') as f:
            f.writelines(out_blocks)
        PYEOF

          if [ -s "$MERGED" ]; then
            COUNT=$(grep -c "ISSUE_START" "$MERGED" || true)
            echo "  $FILE — ${COUNT} issue(s) [Gemini:${G_HTTP} Groq:${R_HTTP}]"
            cat "$MERGED" >> "$ALL_ISSUES"
          else
            echo "  $FILE — clean [Gemini:${G_HTTP} Groq:${R_HTTP}]"
          fi

          # ── Clean up per-file temp artefacts ────────────────────────────────
          rm -f "$PROMPT_FILE" "$GP_FILE" "$RP_FILE" \
                "$G_RAW" "$R_RAW" "$G_STATUS" "$R_STATUS" \
                "$G_TEXT" "$R_TEXT" "$MERGED"

          SCANNED=$((SCANNED + 1))
          # Quota-friendly pacing: longer pause every 10 files
          if [ $((SCANNED % 10)) -eq 0 ]; then
            echo "  Quota pause 20s..."
            sleep 20
          else
            sleep 2
          fi
        done

        echo "AI scan complete: $SCANNED/$TOTAL files processed"

    # ════════════════════════════════════════════════════════════════════════════
    # LAYER 4 — Unified dedup engine + GitHub issue creator
    #
    # FINGERPRINT v5: sha256(app | file | code | line)
    #   - No 'source' field → same issue from different tools = one issue
    #   - Migrates fp4 → fp5: parses existing issue bodies to prevent re-creation
    #
    # Fix block uses plain string concatenation (not template literals)
    # for unambiguous backtick count in markdown code fences.
    # ════════════════════════════════════════════════════════════════════════════

    - name: 'Layer 4: Create GitHub issues (all sources, dedup-guaranteed)'
      if: steps.hash.outputs.changed == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs     = require('fs');
          const crypto = require('crypto');

          const APP     = '${{ inputs.app-name }}';
          const APP_LBL = '${{ inputs.app-label }}';
          const SEV_EMOJI = { critical: '🔴', high: '🟠', medium: '🟡', low: '🔵' };
          const VALID_SEV = new Set(['critical', 'high', 'medium', 'low']);

          // ── Fingerprint v5: source-independent ────────────────────────────
          // Same issue from different tools/models produces the same hash.
          const fp = (file, code, line) =>
            'fp5:' + crypto.createHash('sha256')
              .update([APP, file.trim().toLowerCase(), code.trim().toLowerCase(), String(line || '').trim()].join('|'))
              .digest('hex').substring(0, 32);

          const extractFP = body => {
            // Match both fp5 and fp4 prefixes
            const m = (body || '').match(/<!--fp:(fp[45]:[^>]+)-->/);
            return m ? m[1].trim() : null;
          };

          const getField = (txt, key) => {
            const m = txt.match(new RegExp(`^${key}:\\s*(.+)$`, 'm'));
            return m ? m[1].trim() : '';
          };

          // ── Load ALL existing flutter-analysis issues ──────────────────────
          console.log('Fetching existing flutter-analysis issues...');
          const allExisting = await github.paginate(
            github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'all', labels: 'flutter-analysis', per_page: 100,
            }
          );

          const fpMap = new Map();

          for (const issue of allExisting) {
            const body  = issue.body || '';
            const title = issue.title || '';

            // ── Check for fp5 fingerprint first ──────────────────────────────
            const fp5m = body.match(/<!--fp:(fp5:[^>]+)-->/);
            if (fp5m) {
              fpMap.set(fp5m[1].trim(), issue);
              continue;
            }

            // ── Migrate fp4: extract fields from body, compute fp5 equivalent ─
            // This prevents re-creating issues that already exist under fp4.
            const fp4m = body.match(/<!--fp:(fp4:[^>]+)-->/);
            if (fp4m) {
              // Only migrate issues for THIS app
              const isThisApp = (issue.labels || []).some(l =>
                (typeof l === 'string' ? l : l.name) === APP_LBL
              );
              if (!isThisApp) continue;

              // Extract file, line, and code from the structured body
              const fileM = body.match(/\| File \| `([^`]+)` \|/);
              const lineM = body.match(/\| Line \| (\S+) \|/);
              const codeM = title.match(/\[([A-Z]{2})\]/);

              if (fileM && codeM) {
                const migratedFp = fp(fileM[1], codeM[1], lineM ? lineM[1] : '');
                fpMap.set(migratedFp, issue);
              }
            }
          }
          console.log(`Loaded ${fpMap.size} existing fingerprints (fp4 migrated + fp5)`);

          let created = 0, skipped = 0, reopened = 0, failed = 0;

          // ── Process a single issue finding ──────────────────────────────────
          const processIssue = async ({ file, line, category, code, sev, title, desc, fix, source, extraLabels = [] }) => {
            if (!file || !title) return;

            const fingerprint = fp(file, code, line);
            const emoji       = SEV_EMOJI[sev] || '🔵';
            const severity    = VALID_SEV.has(sev) ? sev : 'low';

            const prior = fpMap.get(fingerprint);
            if (prior) {
              if (prior.state === 'closed') {
                // Regression: issue was closed but bug is back
                try {
                  await github.rest.issues.update({
                    owner: context.repo.owner, repo: context.repo.repo,
                    issue_number: prior.number, state: 'open',
                  });
                  await github.rest.issues.createComment({
                    owner: context.repo.owner, repo: context.repo.repo,
                    issue_number: prior.number,
                    body: '⚠️ **Regression** — reappeared in `' + file + '` line ' + (line || '?') + '.\n_Re-opened by ' + source + ' · ' + new Date().toUTCString() + '_',
                  });
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner, repo: context.repo.repo,
                    issue_number: prior.number, labels: ['regression'],
                  });
                  reopened++;
                  console.log('REOPEN [' + source + ']: ' + title);
                } catch (e) { failed++; console.error('REOPEN FAILED: ' + e.message); }
              } else {
                skipped++;
              }
              return;
            }

            const labels = ['flutter-analysis', 'flutter', APP_LBL, severity, ...extraLabels];

            // Plain string concatenation for code fences — no template literal
            // escape confusion, guaranteed exactly 3 backticks each side.
            const fixBlock = fix
              ? '**Fix:**\n```dart\n' + fix + '\n```'
              : '';

            const body = [
              '<!--fp:' + fingerprint + '-->',
              '### ' + emoji + ' `' + file + '`',
              '| Field | Value |',
              '|---|---|',
              '| File | `' + file + '` |',
              '| Line | ' + (line || '–') + ' |',
              '| Category | ' + category + ' |',
              '| Severity | ' + severity + ' |',
              '| Found by | ' + source + ' |',
              '',
              '**Problem:** ' + desc,
              '',
              fixBlock,
              '',
              '---',
              '_Auto-generated by Truxify analysis pipeline · ' + source + ' · ' + new Date().toUTCString() + '_',
            ].filter(Boolean).join('\n');

            // Retry with exponential backoff for rate limits
            for (let attempt = 0; attempt < 3; attempt++) {
              try {
                await github.rest.issues.create({
                  owner: context.repo.owner, repo: context.repo.repo,
                  title: emoji + ' [' + code + '] ' + title,
                  body, labels,
                });
                fpMap.set(fingerprint, { state: 'open' });
                created++;
                console.log('CREATED [' + source + ']: ' + title);
                break;
              } catch (e) {
                if (e.status === 403 && attempt < 2) {
                  const wait = Math.pow(2, attempt + 1) * 1000;
                  console.log('Rate limited, waiting ' + wait + 'ms...');
                  await new Promise(r => setTimeout(r, wait));
                } else {
                  failed++;
                  console.error('FAILED: ' + e.message);
                  break;
                }
              }
            }
            // Pace issue creation to avoid secondary rate limits
            await new Promise(r => setTimeout(r, 1000));
          };

          // ════════════════════════════════════════════════════════════════════
          // SOURCE A: Semgrep
          // ════════════════════════════════════════════════════════════════════
          for (const sf of ['semgrep_' + APP + '.json', 'semgrep_community_' + APP + '.json']) {
            if (!fs.existsSync(sf)) continue;
            let data;
            try { data = JSON.parse(fs.readFileSync(sf, 'utf8')); } catch (e) { continue; }
            const results = data.results || [];
            console.log('Semgrep (' + sf + '): ' + results.length + ' findings');

            for (const r of results) {
              const meta   = r.extra?.metadata || {};
              const rawSev = (r.extra?.severity || 'WARNING').toLowerCase();
              const sev    = rawSev === 'error' ? 'high'
                : rawSev === 'warning' ? 'medium' : 'low';
              await processIssue({
                file:        r.path || '',
                line:        r.start?.line || '',
                category:    meta.category || 'Quality',
                code:        meta.code || 'CQ',
                sev,
                title:       (r.check_id || 'semgrep-issue').split('.').pop().replace(/-/g, ' '),
                desc:        r.extra?.message || r.message || 'See semgrep rule',
                fix:         r.extra?.fix || '',
                source:      'semgrep',
                extraLabels: ['semgrep'],
              });
            }
          }

          // ════════════════════════════════════════════════════════════════════
          // SOURCE B: Dart Code Metrics
          // ════════════════════════════════════════════════════════════════════
          const dcmFile = 'dcm_' + APP + '.json';
          if (fs.existsSync(dcmFile)) {
            let dcm;
            try { dcm = JSON.parse(fs.readFileSync(dcmFile, 'utf8')); } catch (e) { dcm = []; }
            const files = Array.isArray(dcm) ? dcm : (dcm.files || []);
            console.log('DCM: ' + files.length + ' file records');

            for (const f of files) {
              const filePath = f.path || f.relativePath || '';
              for (const issue of (f.issues || [])) {
                const sev = issue.severity === 'error' ? 'high'
                  : issue.severity === 'warning' ? 'medium' : 'low';
                await processIssue({
                  file:        filePath,
                  line:        issue.location?.start?.line || '',
                  category:    'Maintainability',
                  code:        'MA',
                  sev,
                  title:       (issue.ruleId || 'dart metrics issue').replace(/-/g, ' '),
                  desc:        issue.message || issue.ruleId || 'Dart Code Metrics violation',
                  fix:         '',
                  source:      'dart-metrics',
                  extraLabels: ['dart-metrics'],
                });
              }
              for (const [metric, value] of Object.entries(f.metrics || {})) {
                const thresholds = { cyclomatic_complexity: 10, lines_of_code: 100, number_of_parameters: 5 };
                const threshold  = thresholds[metric];
                if (threshold && value > threshold) {
                  await processIssue({
                    file:        filePath,
                    line:        '1',
                    category:    'Maintainability',
                    code:        'MA',
                    sev:         value > threshold * 2 ? 'high' : 'medium',
                    title:       metric.replace(/_/g, ' ') + ' too high',
                    desc:        metric + ' is ' + value + ', threshold is ' + threshold + '. Consider refactoring.',
                    fix:         '',
                    source:      'dart-metrics',
                    extraLabels: ['dart-metrics'],
                  });
                }
              }
            }
          }

          // ════════════════════════════════════════════════════════════════════
          // SOURCE D: AI semantic (Gemini + Groq, already merged + deduped)
          // ════════════════════════════════════════════════════════════════════
          const aiFile = 'ai_issues_' + APP + '.txt';
          if (fs.existsSync(aiFile)) {
            const text   = fs.readFileSync(aiFile, 'utf8');
            const blocks = [...text.matchAll(/ISSUE_START([\s\S]*?)ISSUE_END/g)];
            console.log('AI: ' + blocks.length + ' findings');

            for (const block of blocks) {
              const t = block[1];
              await processIssue({
                file:        getField(t, 'file'),
                line:        getField(t, 'line'),
                category:    getField(t, 'category') || 'Quality',
                code:        getField(t, 'code') || 'CQ',
                sev:         (getField(t, 'severity') || 'low').toLowerCase(),
                title:       getField(t, 'title'),
                desc:        getField(t, 'description'),
                fix:         getField(t, 'fix'),
                source:      'ai-semantic',
                extraLabels: ['ai-generated'],
              });
            }
          }

          // ── Summary ─────────────────────────────────────────────────────────
          console.log('\n══ ' + APP.toUpperCase() + ' APP SUMMARY ══');
          console.log('Created  : ' + created);
          console.log('Skipped  : ' + skipped + '  (already open)');
          console.log('Reopened : ' + reopened + ' (regressions)');
          console.log('Failed   : ' + failed);
          if (failed > 0) core.setFailed(failed + ' issue(s) failed to create');
